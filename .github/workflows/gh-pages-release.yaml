# ─────────────────────────────────────────────────────────────────────────────
# GitHub Pages Helm repository release pipeline.
#
# Uses helm/chart-releaser-action (cr) to:
#   1. Detect new chart versions by comparing Chart.yaml version against
#      existing git tags (idempotent — reruns are safe).
#   2. Package each changed chart into a signed .tgz archive via `cr package`.
#   3. Upload the .tgz as a binary asset to a versioned GitHub Release.
#   4. Rebuild index.yaml and push it to the gh-pages branch, which GitHub
#      Pages serves as the public Helm repository endpoint.
#
# Consumer usage (after GitHub Pages is enabled):
#   helm repo add hedgedoc https://<owner>.github.io/<repo>
#   helm repo update
#   helm install hedgedoc hedgedoc/hedgedoc
#
# ── One-time setup (run locally, once per repository) ───────────────────────
#   # 1. Create an orphan gh-pages branch:
#   git checkout --orphan gh-pages
#   git reset --hard
#   git commit --allow-empty -m "chore: initialise gh-pages branch"
#   git push origin gh-pages
#   git checkout main
#
#   # 2. Enable GitHub Pages:
#   #    Repo → Settings → Pages → Source: Deploy from branch → gh-pages / root
#
# ── Trigger ──────────────────────────────────────────────────────────────────
#   • Push to main that touches charts/** or this workflow file.
#   • chart-releaser skips versions that already have a git tag, so reruns on
#     the same commit are safe and produce no duplicate releases.
#
# ── Required GITHUB_TOKEN permissions ────────────────────────────────────────
#   contents: write  — create GitHub Releases and push index.yaml to gh-pages
# ─────────────────────────────────────────────────────────────────────────────
name: 📄 Release Helm Chart (GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/gh-pages-release.yaml"

# Least-privilege: only the permissions this workflow actually needs.
permissions:
  contents: write  # create GitHub Releases + commit to gh-pages branch

jobs:
  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB – RELEASE                                                           ║
  # ║  Package chart versions not yet tagged, publish to the gh-pages          ║
  # ║  Helm repository and create corresponding GitHub Releases.               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  release:
    name: Package & Publish to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      # fetch-depth: 0 is required so that cr can inspect all existing git tags
      # to determine which chart versions have already been released.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Git identity ──────────────────────────────────────────────────────────
      # cr commits index.yaml back to the gh-pages branch; a named identity is
      # required for the commit to be accepted by GitHub.
      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Helm toolchain ────────────────────────────────────────────────────────
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      # ── Resolve chart dependencies ────────────────────────────────────────────
      # chart-releaser-action v1.6.x calls `cr package` → `helm package` in an
      # isolated step that is unaware of locally-fetched sub-chart archives.
      # Because charts/*/charts/ is gitignored the directory does not exist
      # after a clean checkout, so `helm package` would fail with
      # "found in Chart.yaml, but missing in charts/ directory: postgresql".
      #
      # Fix: run `helm dependency update` and `helm package` ourselves into
      # .cr-release-packages/ and tell chart-releaser-action to skip packaging
      # (skip_packaging: true) so it only handles upload + index-update.
      - name: Add Bitnami repository
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Update chart dependencies
        run: helm dependency update charts/hedgedoc

      # .helmignore contains "*.tgz", which causes helm package (and helm's
      # chart loader) to ignore sub-chart .tgz archives in charts/hedgedoc/charts/.
      # Fix: extract each downloaded .tgz into its sibling directory and remove
      # the archive — identical to what the lint and test jobs already do.
      - name: Extract sub-chart archives
        run: |
          find charts/hedgedoc/charts -maxdepth 1 -name '*.tgz' | while read -r f; do
            tar -xzf "${f}" -C "$(dirname "${f}")" && rm "${f}"
          done

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/hedgedoc --destination .cr-release-packages/

      # ── chart-releaser (upload + index only) ─────────────────────────────────
      # skip_packaging: true — we already packaged above with resolved deps.
      # skip_existing:  true — idempotent: re-runs won't fail if the release
      #                        asset already exists on GitHub.
      # cr upload  — creates a GitHub Release per package and attaches the .tgz.
      # cr index   — rebuilds index.yaml from all release assets and pushes to
      #              the gh-pages branch so `helm repo update` picks it up.
      - name: Run chart-releaser (upload + index)
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          skip_packaging: true
          skip_existing: true
          mark_as_latest: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
