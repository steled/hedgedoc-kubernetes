{{- if not .Values.existingConfigMap -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hedgedoc.fullname" . }}-config
  labels:
    {{- include "hedgedoc.labels" . | nindent 4 }}
data:
  {{- /*
    Render every key/value pair from extraEnv as a ConfigMap entry.
    Only non-empty values are included to avoid injecting empty environment
    variables that might override HedgeDoc's own defaults.
    Sensitive variables (CMD_DB_URL, CMD_SESSION_SECRET, CMD_S3_ACCESS_KEY_ID,
    CMD_S3_SECRET_ACCESS_KEY, OAuth secrets, etc.) must NOT appear here —
    they are managed exclusively in the Secret template.
  */}}
  {{- range $key, $value := .Values.extraEnv }}
  {{- if ne ($value | toString) "" }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
