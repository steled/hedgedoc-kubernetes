{{- if not .Values.existingSecret -}}
{{- /*
  ── Session Secret Resolution ─────────────────────────────────────────────────
  Priority order:
    1. Pre-existing Secret in the cluster (upgrade path — preserves the value
       so active sessions are not invalidated after every helm upgrade).
    2. Explicitly provided sessionSecret value in values.yaml.
    3. Randomly generated 64-char alphanumeric string (first install).

  The lookup() call is a no-op when running `helm template` outside a cluster
  (returns nil), so a fresh random value is generated in that case — this is
  acceptable for local rendering and CI linting.
*/}}
{{- $secretName      := printf "%s-secret" (include "hedgedoc.fullname" .) -}}
{{- $previousSecret  := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $sessionSecret   := "" -}}
{{- if and $previousSecret (index $previousSecret.data "CMD_SESSION_SECRET") -}}
  {{- $sessionSecret = index $previousSecret.data "CMD_SESSION_SECRET" | b64dec -}}
{{- else if .Values.sessionSecret -}}
  {{- $sessionSecret = .Values.sessionSecret -}}
{{- else -}}
  {{- $sessionSecret = randAlphaNum 64 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hedgedoc.labels" . | nindent 4 }}
  annotations:
    # Prevent accidental deletion of the Secret on `helm uninstall`.
    # Remove this annotation manually if you want the Secret cleaned up.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # ── Database connection (full URL required by HedgeDoc / Sequelize) ─────────
  # hedgedoc.databaseUrl is only called here, inside the "if not existingSecret"
  # guard, so the required() validations in _helpers.tpl never fire when an
  # external secret is used.
  CMD_DB_URL: {{ include "hedgedoc.databaseUrl" . | quote }}

  # ── Session signing key ─────────────────────────────────────────────────────
  CMD_SESSION_SECRET: {{ $sessionSecret | quote }}

  # ── S3-compatible storage credentials (only injected when configured) ───────
  {{- if .Values.s3.accessKeyId }}
  CMD_S3_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.s3.secretAccessKey }}
  CMD_S3_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey | quote }}
  {{- end }}
{{- end }}
