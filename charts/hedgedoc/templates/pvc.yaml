{{- /*
  Create the PVC for /hedgedoc/public/uploads only when:
    - persistence.enabled is true, AND
    - CMD_IMAGE_UPLOAD_TYPE is not "s3" (uploads are then delegated to object storage).
*/}}
{{- $uploadType   := index .Values.extraEnv "CMD_IMAGE_UPLOAD_TYPE" | default "filesystem" }}
{{- $mountUploads := and .Values.persistence.enabled (ne $uploadType "s3") }}
{{- if $mountUploads -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hedgedoc.fullname" . }}-uploads
  labels:
    {{- include "hedgedoc.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode | quote }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
{{- end }}
